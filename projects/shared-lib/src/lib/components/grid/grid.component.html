<section class="product px-2">
  <div class="container">
    <ngx-slick-carousel
      #slickModal="slick-carousel"
      id="slick-carousel"
      class="slick-carousel"
      [config]="promoBannerSlideConfig"
    >
      <!-- Slide 1 -->
      @for (slide of dataService.getSpecificGeneralSettings(data?.data?.title); track slide.img) {
      <div class="px-1" ngxSlickItem>
        <a class="cursor-pointer">
          <img [routerLink]="slide.url" [src]="slide.imgSrc" alt="" class="rounded-4" />
        </a>
      </div>
      }
    </ngx-slick-carousel>
  </div>
</section>

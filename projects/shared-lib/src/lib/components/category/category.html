<div class="d-flex d-none align-items-center bg-light p-1">
  <button class="btn btn-light d-flex align-items-center" (click)="back()">
    <svg
      fill="none"
      height="24"
      viewBox="0 0 24 24"
      width="24"
      xmlns="http://www.w3.org/2000/svg"
      style="height: 1.5rem; width: 1.5rem; color: black"
    >
      <path
        d="M15.5 19L8.5 12L15.5 5"
        stroke="black"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2.5"
      ></path>
    </svg>
    <span class="d-inline-block" style="height: 24px; line-height: 24px">Back</span>
  </button>
</div>

<!--------------- blog-tittle-section---------------->
<section class="blog">
  <div class="container">
    <div class="blog-bradcrum">
      <span><a href="/">Home</a></span>
      <span class="devider">/</span>
      <span class="fw-semibold">Category</span>
    </div>
    <div class="blog-heading about-heading">
      <h1 class="heading">Category</h1>
    </div>
  </div>
</section>
<!--------------- blog-tittle-section-end---------------->

<section class="product-category product">
  <div class="container">
    <div class="row d-flex g-2">
      @for (item of categoryListData; track $index) {
        <div class="col-md-2 col-6">
          <a class="category-link" (click)="gotoCategory(item.id)">
            <div class="product-wrapper border p-2 text-center rounded d-flex flex-column">
              <div class="wrapper-img">
                <img [src]="imgUrl + '/' + item?.thumbnail" width="120" alt="" />
              </div>
              <span class="wrapper-details mt-auto pt-2">{{ item?.name }}</span>
            </div>
          </a>
        </div>
      }
    </div>
  </div>
</section>
